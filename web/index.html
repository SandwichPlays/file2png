<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File 2 PNG</title>
    <meta name="description"
        content="Losslessly convert any file into a PNG image and back. Private, offline, and secure.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        @font-face {
            font-family: 'SF Pro';
            src: url('./fonts/SF-Pro.ttf') format('truetype');
            font-weight: 100 900;
        }

        :root {
            --bg-base: #FFFFFF;
            --bg-page: #FBFBFD;
            --element-bg: #F2F2F7;
            --element-hover: #E5E5EA;
            --accent: #007AFF;
            --green: #34C759;
            --green-text: #1F8D3B;
            --red: #FF3B30;
            --red-text: #C02C23;
            --text-main: #000000;
            --text-muted: #6C6C70;
            --radius-main: 28px;
            --radius-btn: 14px;
            --card-border: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-base: #1C1C1E;
            --bg-page: #000000;
            --element-bg: #2C2C2E;
            --element-hover: #3A3A3C;
            --accent: #0A84FF;
            --green: #30D158;
            --green-text: #30D158;
            --red: #FF453A;
            --red-text: #FF453A;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: 'SF Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            overflow-y: scroll;
            /* Force scrollbar to avoid jumps */
        }

        .navbar {
            width: 100%;
            max-width: 1200px;
            padding: 32px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text-main);
        }

        .logo img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
        }

        main {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            padding: 0 24px 64px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .app-card {
            width: 100%;
            max-width: 640px;
            background: var(--bg-base);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-main);
            padding: 4px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.04);
            position: relative;
            margin-top: 40px;
        }

        .container {
            width: 100%;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.6px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .subtitle {
            margin: 0;
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        .drop-zone {
            min-height: 240px;
            background: var(--element-bg);
            border-radius: calc(var(--radius-main) - 8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            outline: 2px solid transparent;
            outline-offset: -4px;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            background: var(--element-hover);
            transform: scale(0.995);
        }

        .drop-zone.dragover {
            outline-color: var(--accent);
        }


        .drop-hint {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .file-name {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85%;
            font-variant-numeric: tabular-nums;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 16px;
        }

        button {
            flex: 1;
            padding: 14px 0;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
            background: var(--element-bg);
            transition: all 0.2s ease;
            letter-spacing: -0.2px;
        }

        button:hover:not(:disabled) {
            background: var(--element-hover);
            transform: scale(1.02);
        }

        button:active:not(:disabled) {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-auto.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }

        .btn-auto.active:hover {
            background: #006ce4;
        }

        .btn-encode {
            color: var(--green-text);
            background: rgba(52, 199, 89, 0.15);
        }

        .btn-encode:hover:not(:disabled) {
            background: rgba(52, 199, 89, 0.25);
        }

        .btn-decode {
            color: var(--red-text);
            background: rgba(255, 59, 48, 0.12);
        }

        .btn-decode:hover:not(:disabled) {
            background: rgba(255, 59, 48, 0.2);
        }


        /* Progress Bar */
        .progress-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--element-hover);
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            width: 30%;
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            animation: progress 1.5s infinite ease-in-out;
            transform-origin: left;
        }

        @keyframes progress {
            0% {
                transform: translateX(-100%) scaleX(0.2);
            }

            50% {
                transform: translateX(100%) scaleX(1);
            }

            100% {
                transform: translateX(300%) scaleX(0.2);
            }
        }

        .toast {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px) scale(0.9);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 99px;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            pointer-events: none;
            letter-spacing: -0.2px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0) scale(1);
            opacity: 1;
        }

        .theme-toggle {
            cursor: pointer;
            padding: 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: all 0.2s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .theme-toggle:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        .footer {
            width: 100%;
            padding: 64px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: -0.1px;
        }

        .footer p {
            margin-bottom: 8px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
        }

        .footer-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-link:hover {
            color: var(--text-main);
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 24px 20px;
            }

            .container {
                padding: 32px 20px;
            }

            h1 {
                font-size: 28px;
            }

            .app-card {
                margin-top: 20px;
                border: none;
                box-shadow: none;
                background: transparent;
            }

            .drop-zone {
                min-height: 200px;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
    <script src="https://unpkg.com/pako@latest/dist/pako.min.js"></script>
    <script src="https://unpkg.com/upng-js@latest/UPNG.js"></script>
    <script src="https://unpkg.com/fflate"></script>
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <img src="favicon.ico" alt="File 2 PNG Logo">
        </div>
        <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
            <svg id="moon-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="sun-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </div>
    </nav>

    <main>
        <div class="app-card">
            <div class="container" id="main-container">
                <!-- Progress Bar -->
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar"></div>
                </div>

                <div class="header">
                    <h1>File 2 PNG</h1>
                    <div class="subtitle">Turn ANY file into a PNG and back!</div>
                </div>

                <div class="drop-zone" id="drop-zone" onclick="selectFile()">
                    <div class="drop-hint" id="drop-hint">Click or drop a file</div>
                    <div class="file-name" id="file-name">None selected</div>
                </div>

                <div class="actions">
                    <button class="btn-auto" id="btn-auto" disabled onclick="execute('Auto')">Auto</button>
                    <button class="btn-encode" id="btn-encode" disabled onclick="execute('Encode')">Encode</button>
                    <button class="btn-decode" id="btn-decode" disabled onclick="execute('Decode')">Decode</button>
                </div>
                <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Files are processed directly in your browser btw!</p>
        <div class="footer-links">
            <a href="https://github.com/SandwichPlays/file2png" class="footer-link"> -> GitHub Page <- </a>
        </div>
    </footer>

    <div class="toast" id="toast">Ready</div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const hint = document.getElementById('drop-hint');
        const fileNameLabel = document.getElementById('file-name');

        const btnAuto = document.getElementById('btn-auto');
        const btnEncode = document.getElementById('btn-encode');
        const btnDecode = document.getElementById('btn-decode');

        const progressContainer = document.getElementById('progress-container');

        let currentPath = null;
        let currentName = null;

        // Theme Initialization
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.body.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const moonIcon = document.getElementById('moon-icon');
            const sunIcon = document.getElementById('sun-icon');
            if (theme === 'dark') {
                moonIcon.style.display = 'none';
                sunIcon.style.display = 'block';
            } else {
                moonIcon.style.display = 'block';
                sunIcon.style.display = 'none';
            }
        }

        async function selectFile() {
            document.getElementById('file-input').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                setFile(file);
            }
        }

        async function execute(mode) {
            if (!currentFile) return;

            let t_mode = mode;
            if (mode === 'Auto') {
                t_mode = currentFile.name.toLowerCase().endsWith('.f2p.png') ? 'Decode' : 'Encode';
            }

            setLoading(true);
            try {
                if (t_mode === 'Encode') {
                    await runEncode(currentFile);
                } else {
                    await runDecode(currentFile);
                }
                showToast(t_mode + " successful");
                resetUI();
            } catch (error) {
                console.error(error);
                showToast("Error: " + error.message);
            } finally {
                setLoading(false);
            }
        }

        async function runEncode(file) {
            const arrayBuffer = await file.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            
            // Step 1: Compress the core data using fflate (same as Python logic)
            const compressed = fflate.zlibSync(data, { level: 6 });
            
            // Step 2: Build the 'F2P' header (3 bytes Magic + 1 byte NameLen + Name + 4 bytes OrigSize)
            const nameBytes = new TextEncoder().encode(file.name);
            const header = new Uint8Array(3 + 1 + nameBytes.length + 4);
            header.set([70, 50, 80]); // "F2P"
            header[3] = nameBytes.length;
            header.set(nameBytes, 4);
            
            const view = new DataView(header.buffer);
            view.setUint32(4 + nameBytes.length, data.length, false); // Big Endian
            
            // Step 3: Combine Header + Compressed Data
            const combined = new Uint8Array(header.length + compressed.length);
            combined.set(header);
            combined.set(compressed, header.length);
            
            // Step 4: Calculate dimensions for 4-channel RGBA (Same as Python's Pillow logic)
            const totalPixels = Math.ceil(combined.length / 4);
            const side = Math.ceil(Math.sqrt(totalPixels));
            
            // Step 5: Map raw bits to RGBA pixels (Lossless manual mapping)
            const rgba = new Uint8Array(side * side * 4);
            rgba.set(combined);
            
            // Step 6: Use UPNG.js to encode a lossless, unpremultiplied PNG
            const pngBuffer = UPNG.encode([rgba.buffer], side, side, 0); // 0 = lossless conversion
            const blob = new Blob([pngBuffer], { type: 'image/png' });
            download(blob, file.name + ".f2p.png");
        }

        async function runDecode(file) {
            const arrayBuffer = await file.arrayBuffer();
            
            // Step 1: Manually decode the PNG to raw bits (Avoids Canvas premultiplication corruption)
            const img = UPNG.decode(arrayBuffer);
            const bytes = new Uint8Array(UPNG.toRGBA8(img)[0]);
            
            // Step 2: Check 'F2P' Magic Header
            if (bytes[0] !== 70 || bytes[1] !== 50 || bytes[2] !== 80) { // "F2P"
                throw new Error("Invalid File 2 PNG file.");
            }
            
            // Step 3: Extract Name and Compressed Data
            const nameLen = bytes[3];
            const name = new TextDecoder().decode(bytes.slice(4, 4 + nameLen));
            const compressed = bytes.slice(4 + nameLen + 4);
            
            // Step 4: Decompress (fflate handles trailing padding from the image automatically)
            const decompressed = fflate.unzlibSync(compressed);
            const blob = new Blob([decompressed]);
            download(blob, name);
        }

        function download(blob, name) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
        }

        let currentFile = null;

        function setFile(file) {
            currentFile = file;
            fileNameLabel.textContent = file.name;
            hint.textContent = "Ready to process";
            hint.style.color = "var(--accent)";
            btnAuto.disabled = false;
            btnEncode.disabled = false;
            btnDecode.disabled = false;
            btnAuto.classList.add('active');
        }

        function resetUI() {
            currentFile = null;
            fileNameLabel.textContent = "None selected";
            fileNameLabel.style.color = "var(--text-muted)";
            hint.textContent = "Click or drop a file";
            hint.style.color = "var(--text-main)";

            btnAuto.disabled = true;
            btnEncode.disabled = true;
            btnDecode.disabled = true;
            btnAuto.classList.remove('active');
            document.getElementById('file-input').value = '';
        }

        function setLoading(loading) {
            btnAuto.disabled = loading;
            btnEncode.disabled = loading;
            btnDecode.disabled = loading;

            if (loading) {
                progressContainer.style.display = 'block';
            } else {
                progressContainer.style.display = 'none';
            }
        }

        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
            e.dataTransfer.dropEffect = 'copy';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');

            if (e.dataTransfer.files.length > 0) {
                setFile(e.dataTransfer.files[0]);
            }
        });

    </script>
</body>

</html>
