<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File 2 PNG</title>
    <meta name="description"
        content="Losslessly convert any file into a PNG image and back. Private, offline, and secure.">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script src="lib/fflate.js"></script>
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            <img src="favicon.ico" alt="File 2 PNG Logo">
        </div>
        <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
            <svg id="moon-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg id="sun-icon" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
        </div>
    </nav>

    <main>
        <div class="app-card">
            <div class="container" id="main-container">
                <div id="progress-container" class="progress-box" style="display: none;">
                    <div class="progress-bar-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                    <div id="progress-info" class="progress-info">0%</div>
                </div>

                <div id="results-container" class="results-box" style="display: none;">
                    <button id="btn-download" class="btn-auto active" style="width: 100%; justify-content: center; margin-bottom: 10px;">
                        <svg style="width:18px;height:18px;margin-right:8px" viewBox="0 0 24 24"><path fill="currentColor" d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z" /></svg>
                        Download <span id="download-name"></span>
                    </button>
                    <button id="btn-reset" class="btn-decode" style="width: 100%; border:1px solid var(--accent-soft); background:transparent; cursor: pointer; padding: 12px; border-radius: 8px; color: var(--text-main);" onclick="resetUI()">Reset</button>
                </div>

                <div class="header">
                    <h1>File 2 PNG</h1>
                    <div class="subtitle">Turn ANY file into a PNG and back!</div>
                    <div class="subtitle">Auto mode decodes if file has .f2p.png extension, otherwise encodes</div>
                </div>

                <div class="drop-zone" id="drop-zone" onclick="selectFile()">
                    <div class="drop-hint" id="drop-hint">Click or drop a file</div>
                    <div class="file-name" id="file-name">None selected</div>
                </div>

                <div class="actions">
                    <button class="btn-auto" id="btn-auto" disabled onclick="execute('Auto')">Auto</button>
                    <button class="btn-encode" id="btn-encode" disabled onclick="execute('Encode')">Encode</button>
                    <button class="btn-decode" id="btn-decode" disabled onclick="execute('Decode')">Decode</button>
                </div>
                <input type="file" id="file-input" style="display: none;" onchange="handleFileSelect(event)">
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Files are processed directly in your browser btw!</p>
        <div class="footer-links">
            <a href="https://github.com/SandwichPlays/file2png" class="footer-link"> -> GitHub Page <- </a>
        </div>
    </footer>

    <div class="toast" id="toast">Ready</div>

    <script src="script.js"></script>
</body>

</html>
