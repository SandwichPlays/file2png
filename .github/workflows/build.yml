name: Build Executables

on:
  push:
    tags:
      - 'v*' # Automatically triggers when you push a tag like v1.0.0, v2.1, etc.
  workflow_dispatch: # Also allows you to trigger it manually from the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Caches your dependencies for much faster subsequent runs

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgirepository-2.0-dev libgirepository1.0-dev gcc libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0 gir1.2-webkit2-4.1 gir1.2-webkit2-4.0 libwebkit2gtk-4.1-dev libwebkit2gtk-4.0-dev python3-gi

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Linux-specific dependencies
      if: runner.os == 'Linux'
      run: |
        pip install "pywebview[gtk]" PyGObject

    - name: Build with PyInstaller
      run: pyinstaller main.spec

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: File2PNG-builds-${{ matrix.os }}
        path: dist/
